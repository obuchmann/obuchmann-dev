<svg width="680" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The distributed harness topology</title>
<desc>Four altitudes: project repos consolidate into a team harness (running in production), teams exchange knowledge pull-based through affinity exchanges curated by lieutenants, and the most-tracked exchange emerges as the blessed tree — the upper rungs marked as pilot.</desc>
<style>
text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.th{font-size:14px;font-weight:600}
.ts{font-size:12px;font-weight:400}
.tm{fill:#6E6D66}
.arr{fill:none;stroke:#5F5E5A;stroke-width:1.5}
.mk{fill:none;stroke:#5F5E5A;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1}
.teal .th{fill:#085041}
.teal .ts{fill:#0F6E56}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:1}
.gray .th{fill:#444441}
.gray .ts{fill:#5F5E5A}
@media (prefers-color-scheme:dark){
.tm{fill:#A8A69D}
.arr{stroke:#B4B2A9}
.mk{stroke:#B4B2A9}
.teal rect{fill:#085041;stroke:#5DCAA5}
.teal .th{fill:#9FE1CB}
.teal .ts{fill:#5DCAA5}
.gray rect{fill:#444441;stroke:#B4B2A9}
.gray .th{fill:#D3D1C7}
.gray .ts{fill:#B4B2A9}
}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="mk" d="M2 1L8 5L2 9"/></marker></defs>

<g class="teal">
  <rect x="240" y="50" width="200" height="56" rx="8" stroke-dasharray="4 3"/>
  <text class="th" x="340" y="68" text-anchor="middle" dominant-baseline="central">Blessed tree</text>
  <text class="ts" x="340" y="86" text-anchor="middle" dominant-baseline="central">most-tracked exchange</text>
</g>

<line class="arr" x1="200" y1="168" x2="300" y2="108" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="480" y1="168" x2="380" y2="108" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts tm" x="340" y="140" text-anchor="middle" dominant-baseline="central">lieutenants curate</text>

<g class="teal">
  <rect x="110" y="170" width="180" height="56" rx="8" stroke-dasharray="4 3"/>
  <text class="th" x="200" y="188" text-anchor="middle" dominant-baseline="central">Exchange</text>
  <text class="ts" x="200" y="206" text-anchor="middle" dominant-baseline="central">shared stack affinity</text>
</g>
<g class="teal">
  <rect x="390" y="170" width="180" height="56" rx="8" stroke-dasharray="4 3"/>
  <text class="th" x="480" y="188" text-anchor="middle" dominant-baseline="central">Exchange</text>
  <text class="ts" x="480" y="206" text-anchor="middle" dominant-baseline="central">shared domain affinity</text>
</g>

<line class="arr" x1="142.5" y1="288" x2="155" y2="228" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="335" y1="288" x2="245" y2="228" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="515" y1="288" x2="495" y2="228" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g class="gray">
  <rect x="55" y="290" width="175" height="56" rx="8"/>
  <text class="th" x="142.5" y="308" text-anchor="middle" dominant-baseline="central">Team A harness</text>
  <text class="ts" x="142.5" y="326" text-anchor="middle" dominant-baseline="central">forum + consolidation</text>
</g>
<g class="gray">
  <rect x="265" y="290" width="140" height="44" rx="8"/>
  <text class="th" x="335" y="312" text-anchor="middle" dominant-baseline="central">Team B harness</text>
</g>
<g class="gray">
  <rect x="445" y="290" width="140" height="44" rx="8"/>
  <text class="th" x="515" y="312" text-anchor="middle" dominant-baseline="central">Team C harness</text>
</g>

<line class="arr" x1="80" y1="408" x2="100" y2="348" marker-end="url(#arrow)"/>
<line class="arr" x1="172" y1="408" x2="142" y2="348" marker-end="url(#arrow)"/>
<line class="arr" x1="264" y1="408" x2="185" y2="348" marker-end="url(#arrow)"/>

<g class="gray">
  <rect x="40" y="410" width="80" height="44" rx="8"/>
  <text class="th" x="80" y="432" text-anchor="middle" dominant-baseline="central">Project</text>
</g>
<g class="gray">
  <rect x="132" y="410" width="80" height="44" rx="8"/>
  <text class="th" x="172" y="432" text-anchor="middle" dominant-baseline="central">Project</text>
</g>
<g class="gray">
  <rect x="224" y="410" width="80" height="44" rx="8"/>
  <text class="th" x="264" y="432" text-anchor="middle" dominant-baseline="central">Project</text>
</g>

<text class="ts tm" x="340" y="482" text-anchor="middle">solid — running in production · dashed — pilot</text>
</svg>
