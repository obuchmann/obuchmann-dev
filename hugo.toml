baseURL = "https://obuchmann.dev/"
languageCode = "en-us"
title = "obuchmann.dev"
timeZone = "Europe/Vienna"
enableRobotsTXT = true

[params]
author = "Oliver Buchmann"
description = "I write to think — ideas and observations on software architecture, agentic engineering, and how knowledge moves through organizations."
headline = "Thoughts in progress."
tagline = "I write to think — about software architecture, agentic engineering, and how knowledge moves through organizations. Nothing here claims to be right; everything here is an invitation to disagree."

# Cookieless hit counting via GoatCounter (https://<code>.goatcounter.com).
# Only injected in production builds. Empty string disables it.
[params.analytics]
goatcounter = "obuchmann"

[pagination]
pagerSize = 20

[taxonomies]
tag = "tags"

[outputs]
home = ["HTML", "RSS"]

[markup.goldmark.renderer]
unsafe = false

[markup.tableOfContents]
startLevel = 2
endLevel = 3

[[menus.main]]
name = "About"
pageRef = "/about"
weight = 5

[[menus.main]]
name = "Posts"
pageRef = "/posts"
weight = 10

[[menus.main]]
name = "GitHub"
url = "https://github.com/obuchmann/obuchmann-dev"
weight = 30

[[menus.main]]
name = "LinkedIn"
